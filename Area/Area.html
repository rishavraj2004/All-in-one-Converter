<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Area Converter</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="main-container">
        <!-- Navigation Section -->
        <div class="parent">
            <button onclick="goBack()" class="nav-btn">&leftarrow;</button>
            <h3 class="nav-heading">Area</h3>
        </div>

        <!-- Display-section -->
        <div class="main-display">
            <div class="display-container">
                <select class="unit-selector input-unit">
                    <option value="km2" selected>Square Kilometer</option>
                    <option value="ha">Hectare</option>
                    <option value="a">Are</option>
                    <option value="m2">Square Meter</option>
                    <option value="dm2">Square decimeter</option>
                    <option value="cm2">Square centimeter</option>
                    <option value="mm2">Square milimeter</option>
                    <option value="um2">Square micron</option>
                    <option value="ac">Acre</option>
                    <option value="mile2">Square mile</option>
                    <option value="yd2">Square yard</option>
                    <option value="ft2">Square foot</option>
                    <option value="inch2">Square inch</option>
                    <option value="rd2">Square rod</option>
                </select>
                <input type="number" class="input" readonly>

            </div>
        </div>
        <!-- Display Section -->
        <div class="main-display">
            <div class="display-container">
                <select class="unit-selector output-unit">
                    <option value="km2">Square Kilometer</option>
                    <option value="ha" selected>Hectare</option>
                    <option value="a">Are</option>
                    <option value="m2">Square Meter</option>
                    <option value="dm2">Square decimeter</option>
                    <option value="cm2">Square centimeter</option>
                    <option value="mm2">Square milimeter</option>
                    <option value="um2">Square micron</option>
                    <option value="ac">Acre</option>
                    <option value="mile2">Square mile</option>
                    <option value="yd2">Square yard</option>
                    <option value="ft2">Square foot</option>
                    <option value="inch2">Square inch</option>
                    <option value="rd2">Square rod</option>
                </select>
                <div class="display-show"></div>
            </div>
        </div>

        <!-- Keypad Section -->


        <div class="container">
            <div class="keypad">
                <button class="btns">7</button>
                <button class="btns">8</button>
                <button class="btns">9</button>
                <button class="btns">4</button>
                <button class="btns">5</button>
                <button class="btns">6</button>
                <button class="btns">1</button>
                <button class="btns">2</button>
                <button class="btns">3</button>
                <button class="btns">0</button>
                <button class="btns" id="dark-btn">
                    <ion-icon name="moon-outline" class="dark-icon"></ion-icon>
                    <ion-icon name="sunny-outline" class="light-icon"></ion-icon>
                </button>

            </div>
            <div class="side-buttons">
                <button id="allclear">AC</button>
                <button id='backspace'><span class="backspace-icon">⌫</span></button>
            </div>
        </div>
    </main>
</body>
<script src="script.js"></script>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</html>
